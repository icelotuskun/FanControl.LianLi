name: Security

on:
    workflow_dispatch: {}
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
    contents: read

jobs:
    gitleaks:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              # fetch-depth: 0 so the scan can walk the full BASE..HEAD commit range.
              uses: actions/checkout@v6.0.3
              with:
                  fetch-depth: 0

            - name: Install gitleaks
              run: |
                  curl -sSfL --retry 5 --retry-delay 3 --retry-all-errors https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
                      | sudo tar -xz -C /usr/local/bin gitleaks
                  sudo chmod +x /usr/local/bin/gitleaks
                  gitleaks version

            - name: Scan for Secrets in New Commits
              env:
                  BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
                  HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
              run: |
                  set -euo pipefail
                  if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
                      echo "No base SHA, scanning HEAD commit only"
                      RANGE="--max-count=1 ${HEAD_SHA}"
                  else
                      echo "Scanning range ${BASE_SHA}..${HEAD_SHA}"
                      RANGE="${BASE_SHA}..${HEAD_SHA}"
                  fi
                  gitleaks detect --source . --no-banner --verbose --log-opts="${RANGE}"

    dependencies:
        runs-on: windows-latest
        defaults:
            run:
                shell: bash
        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.3

            - name: Setup .NET
              uses: actions/setup-dotnet@v5.3.0
              with:
                  global-json-file: global.json

            - name: Restore
              run: dotnet restore

            - name: Scan for Vulnerable Packages
              run: |
                  set -euo pipefail
                  # `dotnet list package --vulnerable` always exits 0 and reports only on
                  # stdout, so capture the output and fail the job ourselves on any finding.
                  output=$(dotnet list package --vulnerable --include-transitive)
                  echo "$output"
                  if echo "$output" | grep -qiE 'has the following vulnerable packages'; then
                      echo "::error::Vulnerable NuGet packages detected"
                      exit 1
                  fi
                  echo "No vulnerable packages found"
