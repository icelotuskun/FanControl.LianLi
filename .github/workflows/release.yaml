name: Release

# Every push to main builds all three plugin variants (standard + ARGB + Lighting),
# bumps the semver to 1.1.<run_number> and publishes a versioned GitHub release with a
# zip per variant. GitHub automatically marks the newest release as "Latest", so the
# /releases/latest URL always resolves to it. (A rolling "latest" tag is
# intentionally not used: GitHub immutable releases can permanently reserve a
# reused tag name, which breaks a moving tag.)

on:
    workflow_dispatch: {}
    push:
        branches: [main]

permissions:
    contents: write

concurrency:
    # Serialize releases: a push to main waits for any in-flight release to finish
    # rather than cancelling it mid-publish, so pushes produce sequential releases
    # in order (cancelling mid-publish could leave a half-created release/tag).
    group: release-${{ github.ref }}
    cancel-in-progress: false

jobs:
    release:
        runs-on: windows-latest
        # Windows runners default to PowerShell; force bash so the version and
        # packaging steps behave the same as a local WSL build.
        defaults:
            run:
                shell: bash
        env:
            CI: 'true'
        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.3
              with:
                  fetch-depth: 0

            - name: Setup .NET
              uses: actions/setup-dotnet@v5.3.0
              with:
                  global-json-file: global.json

            - name: Compute Version
              id: vars
              # 1.1.x: the post-1.0 feature line (the ARGB and Lighting build variants).
              # run_number is monotonic, so each build gets a higher patch than the last.
              run: |
                  echo "version=1.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
                  echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

            - name: Restore
              run: dotnet restore

            - name: Test
              # Runs before the versioned Build: dotnet test rebuilds the plugin at the
              # default version, so the version-stamped Build must come AFTER it or the
              # stamp gets clobbered and the shipped DLL would not match the release tag.
              run: dotnet test -c Release

            - name: Test ARGB
              # The standard Test above compiles only the #else branch; this runs the
              # ENABLE_ARGB-conditional assertions so the ARGB DLL is gated by its own
              # tests before it is built and published below. Like Test it rebuilds at the
              # default version, so it also runs before the version-stamped builds.
              run: dotnet test -c Release -p:EnableArgb=true

            - name: Test Lighting
              # Same idea as Test ARGB: this runs the ENABLE_LIGHTING-conditional
              # assertions (the L-Connect config reader, lighting encoder, and replay tests,
              # gated on the symbol) so the Lighting DLL is gated by its own tests before it
              # is built and published below. Also rebuilds at the default version, so it runs
              # before the version-stamped builds.
              run: dotnet test -c Release -p:EnableLighting=true

            - name: Build Standard
              # Bake the semver into the assembly so the DLL and the release tag match. This
              # runs after Test so the version-stamped DLL is the one that gets packaged.
              # -o gives each variant its OWN output dir: building the ARGB variant of the
              # same project would otherwise incremental-clean the standard DLL out of the
              # shared bin before Package can grab it.
              run: >
                  dotnet build src/FanControl.LianLi/FanControl.LianLi.csproj
                  -c Release --no-restore -o artifacts/standard
                  -p:Version=${{ steps.vars.outputs.version }}
                  -p:InformationalVersion=${{ steps.vars.outputs.version }}+${{ steps.vars.outputs.sha_short }}

            - name: Build ARGB
              # The ARGB variant: EnableArgb defines ENABLE_ARGB (compiles in the startup
              # ARGB-sync write) and the assembly is renamed to FanControl.LianLi.Argb so it
              # ships as a distinct second DLL beside the standard one (install one OR the
              # other). Its own -o output dir keeps it from clobbering the standard build.
              run: >
                  dotnet build src/FanControl.LianLi/FanControl.LianLi.csproj
                  -c Release --no-restore -o artifacts/argb
                  -p:EnableArgb=true
                  -p:AssemblyName=FanControl.LianLi.Argb
                  -p:Version=${{ steps.vars.outputs.version }}
                  -p:InformationalVersion=${{ steps.vars.outputs.version }}+${{ steps.vars.outputs.sha_short }}

            - name: Build Lighting
              # The Lighting variant: EnableLighting defines ENABLE_LIGHTING (compiles in
              # the startup L-Connect-look replay) and the assembly is renamed to
              # FanControl.LianLi.Lighting so it ships as a distinct third DLL beside the
              # other two (install one of the three). Its own -o output dir keeps it from
              # clobbering the standard and ARGB builds.
              run: >
                  dotnet build src/FanControl.LianLi/FanControl.LianLi.csproj
                  -c Release --no-restore -o artifacts/lighting
                  -p:EnableLighting=true
                  -p:AssemblyName=FanControl.LianLi.Lighting
                  -p:Version=${{ steps.vars.outputs.version }}
                  -p:InformationalVersion=${{ steps.vars.outputs.version }}+${{ steps.vars.outputs.sha_short }}

            - name: Package
              # PowerShell so packaging does not depend on `zip`/`sha256sum` being present in
              # the runner's bash. Each variant ships as its own zip holding a SINGLE plugin
              # DLL plus license and install notes. The host supplies FanControl.Plugins.dll
              # and HidSharp.dll (FanControl ships HidSharp for its own HID sensors; it is not
              # strong-named, so the plugin binds to whatever 2.6.x the host loaded). Shipping
              # our own HidSharp is unnecessary - the host's already-loaded copy wins.
              shell: pwsh
              run: |
                  $version = "${{ steps.vars.outputs.version }}"
                  New-Item -ItemType Directory -Force -Path "dist" | Out-Null

                  function New-PluginPackage($dllPath, $variant, $zipBase, $extraNotes) {
                      $dll = Split-Path $dllPath -Leaf
                      $stage = "dist/$zipBase"
                      New-Item -ItemType Directory -Force -Path $stage | Out-Null
                      Copy-Item $dllPath $stage
                      Copy-Item "LICENSE" "$stage/LICENSE.txt"
                      $install = @(
                          "FanControl.LianLi v$version ($variant build)",
                          "",
                          "Install:",
                          "  1. Unblock the DLL: right-click $dll -> Properties -> tick 'Unblock' -> OK.",
                          "     Windows blocks files downloaded from the internet and FanControl",
                          "     silently ignores a blocked plugin.",
                          "  2. In FanControl, open the menu, click 'Install plugin', and pick $dll.",
                          "     It loads immediately - no restart needed.",
                          "",
                          "  That single DLL is all you need; FanControl already provides HidSharp.dll",
                          "  and FanControl.Plugins.dll.",
                          "",
                          "Do NOT run Lian Li L-Connect at the same time. Both drive the same USB",
                          "controller and L-Connect writes aggressively, which fights this plugin.",
                          "Uninstall L-Connect, or fully exit it and stop its background process",
                          "(L ConnectSystem.exe in Task Manager) before using this plugin."
                      ) + $extraNotes + @(
                          "",
                          "License: MIT (see LICENSE.txt)."
                      )
                      Set-Content -Path "$stage/INSTALL.txt" -Value $install -Encoding ascii
                      $zipName = "$zipBase-v$version.zip"
                      # Zip the staged FILES, not the folder, so the DLL sits at the zip root --
                      # users extract and the DLL is right there, with nothing to dig into.
                      Compress-Archive -Path "$stage/*" -DestinationPath "dist/$zipName" -Force
                      $sha = (Get-FileHash "dist/$zipName" -Algorithm SHA256).Hash.ToLower()
                      Set-Content -Path "dist/$zipName.sha256" -Value $sha -Encoding ascii
                  }

                  New-PluginPackage "artifacts/standard/FanControl.LianLi.dll" "standard" "FanControl.LianLi" @(
                      "",
                      "This standard build controls fan speed and reads RPM. It never touches",
                      "lighting, so it stays out of the way of OpenRGB, L-Connect, or your",
                      "motherboard's RGB software. To sync the fan lighting to your motherboard's",
                      "ARGB header use the ARGB build (FanControl.LianLi.Argb.dll); to re-apply a",
                      "look you designed in L-Connect use the Lighting build",
                      "(FanControl.LianLi.Lighting.dll). Install only one build at a time."
                  )

                  New-PluginPackage "artifacts/argb/FanControl.LianLi.Argb.dll" "ARGB" "FanControl.LianLi-Argb" @(
                      "",
                      "This ARGB build also syncs the fans' lighting to the motherboard's ARGB",
                      "header at startup. On controllers that do not save config to hardware",
                      "(e.g. SL-Infinity 120 V1) this resets lighting to factory defaults on every",
                      "startup. If you do not want that, use the standard build",
                      "(FanControl.LianLi.dll). Install only one build at a time."
                  )

                  New-PluginPackage "artifacts/lighting/FanControl.LianLi.Lighting.dll" "Lighting" "FanControl.LianLi-Lighting" @(
                      "",
                      "This Lighting build re-applies a lighting look you designed in Lian Li's",
                      "L-Connect: set it up once, stop L-Connect, and this build reads L-Connect's",
                      "own saved config and keeps the look with no Lian Li software running. It drives",
                      "lighting only when L-Connect has a saved look (Uni SL-Infinity only); with none",
                      "it behaves exactly like the standard build and leaves lighting untouched. Do NOT",
                      "run it alongside another lighting tool (OpenRGB, L-Connect, motherboard RGB) --",
                      "both would fight over the LEDs. See the project's docs/lighting.md for details.",
                      "Install only one build at a time."
                  )

            - name: Build Release Notes
              id: notes
              # Fill the verbose body template with this version + today's date, then append
              # the commit changelog (titles + bodies) plus a compare link when the range is
              # non-empty; otherwise "No source changes since <tag>." or "First release.".
              # body_path feeds the result to the release below.
              run: |
                  set -euo pipefail
                  version="${{ steps.vars.outputs.version }}"
                  released="$(date -u +'%Y-%m-%d')"
                  repo="${{ github.repository }}"
                  # Highest existing release tag; this run's own tag is not created until publish.
                  prev_tag="$(git tag --list 'v*' --sort=-version:refname | head -n1 || true)"
                  sed "s/{{VERSION}}/${version}/g; s/{{DATE}}/${released}/g" \
                      .github/release-body-template.md > release-notes.md
                  # Capture the commit list once (the same --no-merges text we emit), so the
                  # empty-range guard tests exactly what gets printed - no second history walk.
                  changelog=""
                  if [ -n "$prev_tag" ]; then
                      changelog="$(git log "${prev_tag}..HEAD" --no-merges --reverse --pretty=format:'### %s%n%n%b')"
                  fi
                  {
                      echo
                      if [ -n "$changelog" ]; then
                          printf '%s\n' "$changelog"
                          echo
                          echo "**Full changelog:** https://github.com/${repo}/compare/${prev_tag}...v${version}"
                      elif [ -n "$prev_tag" ]; then
                          echo "No source changes since \`${prev_tag}\`."
                      else
                          echo "First release."
                      fi
                      echo
                      echo "---"
                      echo "Built from commit \`${{ github.sha }}\`."
                  } >> release-notes.md

            - name: Publish Versioned Release
              # Tag matches the semver baked into the DLL above, so the release page and
              # the binary report the same version.
              uses: softprops/action-gh-release@v3.0.0
              with:
                  tag_name: v${{ steps.vars.outputs.version }}
                  name: v${{ steps.vars.outputs.version }}
                  body_path: release-notes.md
                  draft: false
                  prerelease: false
                  files: |
                      dist/*.zip
                      dist/*.sha256
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
