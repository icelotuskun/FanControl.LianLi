name: Dependabot auto-merge

# Auto-merge Dependabot PRs for minor and patch bumps once required checks pass.
# Major bumps are left for manual review. With `--auto`, the merge waits for the
# repository's required status checks before completing -- configure those in
# branch protection (Build, Lint, Security) once the repo is public.

on: pull_request

permissions:
    contents: write
    pull-requests: write

jobs:
    auto-merge:
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Dependabot Metadata
              id: meta
              uses: dependabot/fetch-metadata@v3.1.0

            - name: Enable Auto-Merge for Minor and Patch Updates
              if: steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch'
              run: gh pr merge --auto --squash "$PR_URL"
              env:
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
